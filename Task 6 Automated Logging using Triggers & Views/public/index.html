<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Audit System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Security Audit Dashboard</h1>
            <p>Automated Database Logging via MySQL Triggers & Views</p>
        </header>

        <div class="dashboard-grid">
            <!-- Action Panel -->
            <section class="panel action-panel">
                <h2>Manage Records</h2>
                <form id="employeeForm">
                    <div class="form-group">
                        <label>Employee Name</label>
                        <input type="text" id="name" placeholder="E.g. John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <input type="text" id="position" placeholder="E.g. Senior Architect" required>
                    </div>
                    <div class="form-group">
                        <label>Salary ($)</label>
                        <input type="number" id="salary" placeholder="E.g. 85000" required>
                    </div>
                    <button type="submit" class="btn-primary">Execute Operation</button>
                    <p class="hint">Note: Triggers will automatically log this action.</p>
                </form>
            </section>

            <!-- Audit Logs Panel -->
            <section class="panel logs-panel">
                <h2>Real-Time Audit Logs</h2>
                <div id="logList" class="log-list">
                    <p class="empty-state">No activity logged yet.</p>
                </div>
            </section>

            <!-- Activity Report View Panel -->
            <section class="panel report-panel">
                <h2>Daily Activity Report (VIEW)</h2>
                <div id="reportList" class="report-list">
                    <p class="empty-state">Report view empty.</p>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
