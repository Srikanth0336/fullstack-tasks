<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOrder | Advanced Order Management</title>
    <meta name="description" content="A powerful order management dashboard with real-time analytics and SQL-powered insights.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>NexusOrder</span>
            </div>
            <nav>
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-view="orders">
                    <i data-lucide="shopping-cart"></i> Orders
                </a>
                <a href="#" class="nav-item" data-view="customers">
                    <i data-lucide="users"></i> Customers
                </a>
                <a href="#" class="nav-item" data-view="products">
                    <i data-lucide="package"></i> Products
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">JD</div>
                    <div class="user-info">
                        <p class="user-name">John Admin</p>
                        <p class="user-role">System Manager</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-search">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Search orders, customers...">
                </div>
                <div class="header-actions">
                    <button class="icon-btn"><i data-lucide="bell"></i></button>
                    <button class="primary-btn" id="open-modal-btn"><i data-lucide="plus"></i> New Order</button>
                </div>
            </header>

            <section class="content">
                <!-- Stats Overview -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon purple"><i data-lucide="trending-up"></i></div>
                        <div class="stat-details">
                            <p class="stat-label">Total Revenue</p>
                            <h3 id="stat-revenue">$0.00</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue"><i data-lucide="shopping-bag"></i></div>
                        <div class="stat-details">
                            <p class="stat-label">Total Orders</p>
                            <h3 id="stat-orders">0</h3>
                        </div>
                    </div>
                    <div class="stat-card" id="highest-order-card">
                        <div class="stat-icon green"><i data-lucide="award"></i></div>
                        <div class="stat-details">
                            <p class="stat-label">Highest Order</p>
                            <h3 id="stat-highest">$0.00</h3>
                            <p class="stat-subtext" id="highest-order-customer">Loading...</p>
                        </div>
                    </div>
                    <div class="stat-card" id="active-customer-card">
                        <div class="stat-icon orange"><i data-lucide="user-check"></i></div>
                        <div class="stat-details">
                            <p class="stat-label">Top Customer</p>
                            <h3 id="stat-active-customer">None</h3>
                            <p class="stat-subtext" id="active-customer-orders">0 orders</p>
                        </div>
                    </div>
                </div>

                <!-- Recent Orders Table -->
                <div class="table-container fade-in">
                    <div class="table-header">
                        <h2>Order History (JOIN Analysis)</h2>
                        <div class="table-filters">
                            <button class="filter-btn active">All</button>
                            <button class="filter-btn">Pending</button>
                            <button class="filter-btn">Completed</button>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Name</th>
                                <th>Product</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body">
                            <!-- Rows will be injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Order Modal -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Order</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="add-order-form">
                <div class="form-group">
                    <label>Customer Name</label>
                    <select id="customer-select" required>
                        <option value="">Select Customer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product</label>
                    <select id="product-select" required>
                        <option value="">Select Product</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="order-quantity" value="1" min="1" required>
                </div>
                <div class="form-group">
                    <label>Order Date</label>
                    <input type="date" id="order-date" required>
                </div>
                <button type="submit" class="submit-btn">Save Order</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
