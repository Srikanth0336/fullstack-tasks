<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="login-container">
        <div class="login-card">
            <h1 id="formTitle">Welcome Back</h1>
            <p class="subtitle" id="formSubtitle">Please enter your details to sign in</p>
            
            <form id="loginForm" novalidate>
                <div class="input-group" id="emailGroup" style="display: none;">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="srikanth@example.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. admin" required>
                    <span class="error-msg" id="usernameError"></span>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="error-msg" id="passwordError"></span>
                </div>
                
                <button type="submit" id="loginBtn">
                    <span class="btn-text" id="submitText">Sign In</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
            
            <div id="apiResponse" class="response-banner"></div>
            
            <p class="footer-text" id="toggleText">Don't have an account? <a href="#" id="toggleForm">Request access</a></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
